<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>barq-mind: tests</title>
  <link rel="stylesheet" href="styles/main.css" />
  <script type="importmap">
  {
    "imports": {
      "@huggingface/transformers": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2/dist/transformers.min.js",
      "minisearch": "https://cdn.jsdelivr.net/npm/minisearch@7.1.2/dist/es/index.js"
    }
  }
  </script>
  <style>
    .test-shell { padding: 22px; max-width: 980px; margin: 0 auto; }
    #summary { font-family: var(--mono); font-size: 14px; padding: 8px 14px; border-radius: 4px; display: inline-block; margin-bottom: 12px; }
    #summary.pass { background: #0f3a1a; color: #4ade80; }
    #summary.fail { background: #3b1414; color: #f87171; }
    #results { font-family: var(--mono); font-size: 12px; background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; white-space: pre-wrap; max-height: 70vh; overflow-y: auto; }
    .row { padding: 2px 0; }
    .row.pass { color: var(--ok); }
    .row.fail { color: var(--err); }
    .row.section { color: var(--accent); margin-top: 8px; }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>barq-mind: tests</h1>
    <span class="version">v0.1.0</span>
  </header>

  <main class="test-shell">
    <div id="summary">running...</div>
    <div id="results"></div>

    <section style="margin-top: 22px;">
      <h3 style="color: var(--accent); font-size: 13px; text-transform: uppercase; letter-spacing: 0.6px;">Manual: WebGPU inference</h3>
      <p style="color: var(--text-muted); font-size: 12px;">Loads LFM2.5-1.2B-Instruct on WebGPU and asks "What is the capital of France?". First load downloads ~700 MB.</p>
      <button id="btn-load-model">Load Model</button>
      <button id="btn-test-inference" disabled>Test Inference</button>
      <div id="model-progress" style="margin-top: 10px; font-family: var(--mono); font-size: 12px; color: var(--text-muted);"></div>
      <div id="inference-output" style="margin-top: 10px; font-family: var(--mono); font-size: 12px; color: var(--text); white-space: pre-wrap;"></div>
    </section>
  </main>

  <script type="module">
    import { section } from "./tests/runner.js";
    import { runStorageTests } from "./tests/test-storage.js";
    import { runTreeTests } from "./tests/test-tree.js";
    import { runChunkerTests } from "./tests/test-chunker.js";
    import { runIngestTests } from "./tests/test-ingest.js";
    import { runPromptTests } from "./tests/test-prompts.js";
    import { runBuilderTests } from "./tests/test-builder.js";
    import { runNavigatorTests } from "./tests/test-navigator.js";
    import { runSynthesizerTests } from "./tests/test-synthesizer.js";
    import { runBM25Tests } from "./tests/test-bm25.js";
    import { InferenceEngine } from "./src/inference.js";

    (async () => {
      section("storage");
      await runStorageTests();
      section("tree");
      await runTreeTests();
      section("chunker");
      await runChunkerTests();
      section("ingest");
      await runIngestTests();
      section("prompts");
      await runPromptTests();
      section("builder");
      await runBuilderTests();
      section("navigator");
      await runNavigatorTests();
      section("synthesizer");
      await runSynthesizerTests();
      section("bm25");
      await runBM25Tests();
    })();

    const engine = new InferenceEngine();
    const loadBtn = document.getElementById("btn-load-model");
    const askBtn = document.getElementById("btn-test-inference");
    const progressEl = document.getElementById("model-progress");
    const outputEl = document.getElementById("inference-output");

    loadBtn.addEventListener("click", async () => {
      loadBtn.disabled = true;
      progressEl.textContent = "loading...";
      try {
        await engine.load({
          onProgress: (pct, file) => {
            progressEl.textContent = `${file}: ${(pct * 100).toFixed(1)}%`;
          },
        });
        progressEl.textContent = `ready (${engine.dtype})`;
        askBtn.disabled = false;
      } catch (e) {
        progressEl.textContent = `error: ${e.message}`;
        loadBtn.disabled = false;
      }
    });

    askBtn.addEventListener("click", async () => {
      askBtn.disabled = true;
      outputEl.textContent = "generating...";
      try {
        const t0 = performance.now();
        const result = await engine.chat(
          [{ role: "user", content: "What is the capital of France?" }],
          { max_new_tokens: 64 }
        );
        const ms = (performance.now() - t0).toFixed(0);
        outputEl.textContent = `(${ms}ms, ${result.raw_tokens} tokens)\n\n${result.text}`;
      } catch (e) {
        outputEl.textContent = `error: ${e.message}`;
      } finally {
        askBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
