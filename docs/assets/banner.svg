<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="barq-mind: vector-free hierarchical retrieval">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#10161f"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b07840"/>
      <stop offset="55%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#e8b783"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.35"/>
      <stop offset="65%" stop-color="#d4a574" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.05" fill="#1f2730"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="1280" height="360" fill="url(#bgGrad)"/>
  <rect width="1280" height="360" fill="url(#dots)" opacity="0.55"/>
  <rect x="0" y="0" width="1280" height="360" fill="url(#glowGrad)" opacity="0.85" transform="translate(280 -40)"/>

  <!-- Hairline border -->
  <rect x="0.5" y="0.5" width="1279" height="359" fill="none" stroke="#21272f" stroke-width="1"/>
  <line x1="40" y1="320" x2="1240" y2="320" stroke="#21272f" stroke-width="1"/>

  <!-- Hierarchy diagram on the left half -->
  <g transform="translate(70 70)" stroke="#3a4452" stroke-width="1.6" fill="none" stroke-linecap="round">
    <!-- root to level 1 -->
    <path d="M210 30 C 210 70, 90 90, 90 130"/>
    <path d="M210 30 C 210 70, 210 90, 210 130"/>
    <path d="M210 30 C 210 70, 330 90, 330 130"/>

    <!-- level 1 to level 2 -->
    <path d="M90 150 C 90 175, 50 185, 50 210"/>
    <path d="M90 150 C 90 175, 130 185, 130 210"/>
    <path d="M210 150 C 210 175, 170 185, 170 210"/>
    <path d="M210 150 C 210 175, 250 185, 250 210"/>
    <path d="M330 150 C 330 175, 290 185, 290 210"/>
    <path d="M330 150 C 330 175, 370 185, 370 210"/>
  </g>

  <!-- Highlighted active path (gold) -->
  <g transform="translate(70 70)" stroke="url(#goldGrad)" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M210 30 C 210 70, 210 90, 210 130"/>
    <path d="M210 150 C 210 175, 250 185, 250 210"/>
  </g>

  <!-- Nodes -->
  <g transform="translate(70 70)">
    <!-- Root -->
    <circle cx="210" cy="22" r="9" fill="#0d1117" stroke="url(#goldGrad)" stroke-width="2"/>
    <circle cx="210" cy="22" r="3" fill="url(#goldGrad)"/>

    <!-- Level 1 -->
    <circle cx="90" cy="140" r="7" fill="#0d1117" stroke="#4a5260" stroke-width="1.5"/>
    <circle cx="210" cy="140" r="7.5" fill="#0d1117" stroke="url(#goldGrad)" stroke-width="2"/>
    <circle cx="330" cy="140" r="7" fill="#0d1117" stroke="#4a5260" stroke-width="1.5"/>

    <!-- Level 2 leaves -->
    <rect x="44" y="206" width="12" height="12" rx="2" fill="#0d1117" stroke="#4a5260" stroke-width="1.3"/>
    <rect x="124" y="206" width="12" height="12" rx="2" fill="#0d1117" stroke="#4a5260" stroke-width="1.3"/>
    <rect x="164" y="206" width="12" height="12" rx="2" fill="#0d1117" stroke="#4a5260" stroke-width="1.3"/>
    <rect x="244" y="206" width="12" height="12" rx="2" fill="#0d1117" stroke="url(#goldGrad)" stroke-width="2"/>
    <rect x="284" y="206" width="12" height="12" rx="2" fill="#0d1117" stroke="#4a5260" stroke-width="1.3"/>
    <rect x="364" y="206" width="12" height="12" rx="2" fill="#0d1117" stroke="#4a5260" stroke-width="1.3"/>
  </g>

  <!-- Vertical separator -->
  <line x1="540" y1="80" x2="540" y2="280" stroke="#21272f" stroke-width="1"/>

  <!-- Eyebrow chip -->
  <g transform="translate(596 86)">
    <rect x="0" y="0" width="166" height="22" rx="11" fill="#161b22" stroke="#30363d"/>
    <circle cx="14" cy="11" r="3.5" fill="url(#goldGrad)"/>
    <text x="26" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="1.2" fill="#8b949e">RESEARCH PROTOTYPE</text>
  </g>

  <!-- Wordmark -->
  <text x="596" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="74" font-weight="700" fill="#e6edf3" letter-spacing="-1.5">barq-<tspan fill="url(#goldGrad)">mind</tspan></text>

  <!-- Tagline -->
  <text x="598" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#8b949e">vector-free hierarchical retrieval, on-device.</text>

  <!-- Feature pills -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#c9d1d9">
    <g transform="translate(596 246)">
      <rect width="118" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
      <text x="14" y="17">WebGPU · LFM2.5</text>
    </g>
    <g transform="translate(722 246)">
      <rect width="84" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
      <text x="14" y="17">no vectors</text>
    </g>
    <g transform="translate(814 246)">
      <rect width="92" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
      <text x="14" y="17">two-call agent</text>
    </g>
    <g transform="translate(914 246)">
      <rect width="78" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
      <text x="14" y="17">in-browser</text>
    </g>
  </g>

  <!-- Bottom signature line -->
  <text x="596" y="304" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#5e6772" letter-spacing="1.5">PHASE 0 · v0.1.0 · MIT LICENSE</text>

  <!-- Decorative trailing diamonds -->
  <g transform="translate(1180 70)" fill="url(#goldGrad)" opacity="0.85">
    <rect x="0" y="0" width="6" height="6" transform="rotate(45 3 3)"/>
    <rect x="14" y="14" width="4" height="4" transform="rotate(45 16 16)" opacity="0.6"/>
    <rect x="-12" y="20" width="3" height="3" transform="rotate(45 -10.5 21.5)" opacity="0.4"/>
  </g>
</svg>
